# 0.9.0

env:
  TERM: xterm-256color

window:
  decorations: none
  startup_mode: Maximized
  gtk_theme_variant: dark

scrolling:
  history: 10000
  multiplier: 10

font:
  normal:
    family: 'DejaVuSansMono Nerd Font'
  size: 9.0

draw_bold_text_with_bright_colors: true

shell:
  program: /usr/bin/fish

selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
  save_to_clipboard: true

cursor:
  unfocused_hollow: true
